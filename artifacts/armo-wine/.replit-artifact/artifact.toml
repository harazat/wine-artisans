kind = "web"
previewPath = "/"
title = "ARMO Wine"
version = "1.0.0"
id = "artifacts/armo-wine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25426

[services.development]
run = "pnpm --filter @workspace/armo-wine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/armo-wine", "run", "build" ]
publicDir = "artifacts/armo-wine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25426"
BASE_PATH = "/"
